<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ICCT Portal Dashboard</title>
  <link rel="stylesheet" href="styles.css">
  <style>
    body { background: #f3f6fb; color: #0f172a; font-family: 'Segoe UI', sans-serif; margin: 0; padding: 0; }
    .dashboard-shell { max-width: 1100px; margin: 0 auto; padding: 2rem 1.5rem; }
    .dashboard-header { display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 1rem; background: url('../school.jpg') center / cover no-repeat; background-attachment: fixed; border-radius: 16px; padding: 3rem 2rem; margin-top: 1.5rem; box-shadow: 0 8px 24px rgba(15, 23, 42, 0.15); position: relative; }
    .dashboard-header::before { content: ''; position: absolute; top: 0; left: 0; right: 0; bottom: 0; background: linear-gradient(135deg, rgba(10, 54, 157, 0.4), rgba(30, 64, 175, 0.3)); border-radius: 16px; pointer-events: none; }
    .dashboard-header > div { position: relative; z-index: 1; }
    .dashboard-header h1 { margin: 0; color: #ffffff; font-size: 2.2rem; text-shadow: 0 2px 8px rgba(0, 0, 0, 0.3); }
    .dashboard-card { background: #ffffff; border-radius: 16px; box-shadow: 0 20px 40px rgba(15, 23, 42, 0.08); padding: 2rem; margin-top: 1.5rem; }
    .dashboard-actions { display: flex; gap: 1rem; flex-wrap: wrap; margin-top: 1rem; position: relative; z-index: 1; }
    .dashboard-actions a { padding: 0.85rem 1.3rem; border-radius: 10px; background: #0a369d; color: #fff; text-decoration: none; font-weight: 600; }
    .dashboard-actions a.secondary { background: #1e40af; }
    .back-button { display: inline-flex; align-items: center; gap: 0.5rem; padding: 0.75rem 1.1rem; margin-bottom: 1.5rem; border: none; background: transparent; color: #1e40af; border-radius: 999px; font-size: 0.95rem; font-weight: 700; cursor: pointer; transition: background-color 0.25s ease, transform 0.2s ease, box-shadow 0.2s ease; }
    .back-button:hover, .back-button:focus { background: transparent; box-shadow: none; transform: translateY(-1px); }
    .dashboard-list { display: grid; grid-template-columns: repeat(auto-fit,minmax(260px,1fr)); gap: 1rem; margin-top: 1.5rem; }
    .dashboard-item { background: #f8fafc; border: 1px solid #dbeafe; border-radius: 14px; padding: 1.5rem; }
    .dashboard-item h3 { margin-top: 0; color: #102c57; }

    /* Responsive adjustments for dashboard header background */
    @media (max-width: 768px) {
      .dashboard-header {
        background-attachment: scroll;
        flex-direction: column;
        padding: 2rem 1.5rem;
      }
    }
  </style>
</head>
<body class="dashboard-body">
  <div class="site-logo-corner"><img src="logo.jpg" alt="ICCT logo"></div>
  <div class="dashboard-shell">
    <div class="dashboard-header">
      <div>
        <h1 id="welcomeTitle">Welcome to ICCT</h1>
        <p id="welcomeMessage" style="color: #ffffff; margin-top: 0.5rem; text-shadow: 0 1px 4px rgba(0, 0, 0, 0.2);">Your portal dashboard is ready. Access campus services, schedule information, and account settings.</p>
      </div>
      <div class="dashboard-actions">
        <a href="mainweb.html/homepage.html">Campus Services</a>
      </div>
    </div>

  </div>
  <script src="db.js"></script>
  <script src="terms.js"></script>
  <script>
    const session = DB.requireAuth();
    if (session) {
      const welcomeTitle = document.getElementById('welcomeTitle');
      const welcomeMessage = document.getElementById('welcomeMessage');
      if (welcomeTitle) welcomeTitle.textContent = `Welcome, ${session.name}`;
      if (welcomeMessage) welcomeMessage.textContent =
        'Your portal dashboard is ready. Access your student portal content.';
    }

    function goBack() {
      if (window.history.length > 1) {
        window.history.back();
      } else {
        window.location.href = 'index.html';
      }
    }
  </script>
</body>
</html>
